<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Get in Touch - Travel Explorer</title>
    <link rel="stylesheet" th:href="@{/css/contact.css}">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">Travel Explorer</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/packages">Packages</a></li>
            <li><a href="/contact" class="active">Contact</a></li>
        </ul>
    </nav>

    <!--  Contact Section -->
    <section class="contact-section">
        <div class="contact-container">
            <div class="form-box">
                <h1>Get in Touch</h1>
                <p>We'd love to hear from you!</p>
          <<form th:action="@{/submitBooking}" method="post" onsubmit="return validateForm()">
    <input type="text" id="name" name="name" placeholder="Your Name" required>
    <input type="tel" id="phone" name="phone" placeholder="Your Phone Number" required>
    <input type="email" id="email" name="email" placeholder="Your Email" required>
    <input type="date" id="travelDate" name="travelDate" required>
    <input type="number" id="persons" name="persons" placeholder="Number of Persons" min="1" required>
    <input type="text" name="destination" th:value="${selectedPlace}" placeholder="Selected Destination" readonly>
    <textarea id="message" name="message" placeholder="Your Message" rows="4" required></textarea>
    <button type="submit" class="btn">Send Message</button>
           </form>
                <div class="contact-info">
                    <p><strong>Email Us:</strong> info@travelexplorer.com</p>
                    <p><strong>Call Us:</strong> +123 456 7890</p>
                </div>
            </div>
        </div>
    </section>
   <script>
// ✅ Run once when page loads
document.addEventListener("DOMContentLoaded", function() {
    const travelDateInput = document.getElementById("travelDate");
    const today = new Date();
    today.setHours(0,0,0,0);

    // Format date as yyyy-mm-dd
    function formatDate(date) {
        let d = date.getDate();
        let m = date.getMonth() + 1;
        let y = date.getFullYear();
        if (d < 10) d = "0" + d;
        if (m < 10) m = "0" + m;
        return y + "-" + m + "-" + d;
    }

    // Min = today
    travelDateInput.min = formatDate(today);

    // Max = today + 5 days
    const maxDate = new Date(today);
    maxDate.setDate(today.getDate() + 5);
    travelDateInput.max = formatDate(maxDate);
});

//  Validation runs when form is submitted
function validateForm() {
    // Phone validation: must be 10 digits
    const phone = document.getElementById("phone").value;
    const phoneRegex = /^[6-9]\d{9}$/; // Indian mobile format
    if (!phoneRegex.test(phone)) {
        alert("Please enter a valid 10-digit mobile number starting with 6-9.");
        return false;
    }

    // Email validation
    const email = document.getElementById("email").value;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        alert("Please enter a valid email address.");
        return false;
    }

    // Success popup
    alert("Message sent to Travel Explorer successfully!");
    return true;
}
</script>


</body>
</html>
